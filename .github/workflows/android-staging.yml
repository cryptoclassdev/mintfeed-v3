name: Android APK (Staging)

on:
  push:
    branches: [stage]
    paths:
      - "apps/mobile/**"
      - "packages/shared/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/android-staging.yml"
  workflow_dispatch:

concurrency:
  group: android-staging-${{ github.sha }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Staging APK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/native
          key: gradle-${{ runner.os }}-${{ hashFiles('apps/mobile/android/**/*.gradle*', 'apps/mobile/android/gradle.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode google-services.json
        run: echo "$GOOGLE_SERVICES_JSON" | base64 -d > google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}

      - name: Run Expo prebuild
        run: npx expo prebuild --clean --platform android
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.STAGING_API_URL }}
          EXPO_PUBLIC_SOLANA_CLUSTER: ${{ vars.SOLANA_CLUSTER || 'mainnet-beta' }}
          EXPO_PUBLIC_SOLANA_RPC_URL: ${{ secrets.SOLANA_RPC_URL }}

      - name: Decode keystore
        run: echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Diagnose keystore
        run: |
          echo "Keystore MD5: $(md5sum android/app/release.keystore | awk '{print $1}')"
          echo "Keystore size: $(stat -c%s android/app/release.keystore) bytes"
          echo "Store password length: ${#KS_PASS}"
          echo "Key password length:   ${#KEY_PASS}"
          echo "Alias: '$ALIAS'"
          echo "--- keytool verify with CI env vars ---"
          keytool -list -keystore android/app/release.keystore -storepass "$KS_PASS" -alias "$ALIAS" && echo "keytool list OK"
          keytool -certreq -keystore android/app/release.keystore -storepass "$KS_PASS" -alias "$ALIAS" -keypass "$KEY_PASS" -file /tmp/test.csr 2>&1 && echo "keytool certreq (key password verified) OK" || echo "keytool certreq FAILED"
        env:
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}

      - name: Build signed APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-build-cache --no-daemon -x lint \
            -PreactNativeArchitectures=arm64-v8a
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.STAGING_API_URL }}
          EXPO_PUBLIC_SOLANA_CLUSTER: ${{ vars.SOLANA_CLUSTER || 'mainnet-beta' }}
          EXPO_PUBLIC_SOLANA_RPC_URL: ${{ secrets.SOLANA_RPC_URL }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          SENTRY_DISABLE_AUTO_UPLOAD: 'true'

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: midnight-staging-${{ github.sha }}
          path: apps/mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 14
